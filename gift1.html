<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(#081421,#020b12);
    font-family: Arial, sans-serif;
}
.back{
    position:fixed;
    top:15px;
    left:15px;
    width:40px;
    height:40px;
    background:#ffffffcc;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
}
.text-box{
    position:absolute;
    max-width:80%;
    padding:14px 20px;
    border-radius:25px;
    font-size:30px;
    font-weight:bold;
    color:#333;

    word-wrap: break-word;
    white-space: normal;

    animation: fall 16s linear infinite;
}

@keyframes fall{
    0%{
        top:-120px;
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        top:110vh;
        opacity:0;
    }
}
</style>
</head>

<body>
<div class="back" onclick="history.back()">✖</div>
<script>

const messages = [
"Chúc mừng 8/3 ❤️",
"Chúc bạn luôn xinh đẹp",
"Chúc bạn luôn hạnh phúc",
"Chúc bạn luôn rạng rỡ",
"Chúc bạn luôn thành công",
"Chúc bạn luôn vui vẻ",
"Chúc bạn luôn tỏa sáng",
"Chúc bạn nhiều may mắn",
"Chúc bạn luôn được yêu thương",
"Chúc bạn luôn mạnh mẽ",
"Chúc bạn luôn bình an",
"Chúc bạn thật nhiều niềm vui",
"Chúc bạn ngày càng xinh đẹp",
"Chúc bạn luôn mỉm cười",
"Chúc bạn luôn tràn đầy năng lượng",
"Chúc bạn thật nhiều hạnh phúc",
"Chúc bạn luôn tươi trẻ",
"Chúc bạn luôn được quan tâm",
"Chúc bạn luôn đáng yêu",
"Happy Women's Day 🌸"
];

messages.forEach((text,i)=>{

    const div=document.createElement("div");
    div.className="text-box";
    div.innerText=text;

    // delay xa hơn để tránh chồng
    div.style.animationDelay = (i*2.5)+"s";

    // vị trí ngang random
    div.style.left = (10 + Math.random()*80)+"%";

    // màu random
    div.style.background =
    "hsl("+Math.random()*360+",70%,85%)";

    document.body.appendChild(div);
});

</script>
</body>
</html>
